<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KLN College Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#004080,#0073e6);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
width:400px;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
text-align:center;
}

.logo{
width:120px;
margin-bottom:15px;
}

h2{
color:#003366;
margin-bottom:5px;
}

p{
color:gray;
margin-bottom:20px;
font-size:14px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#003366;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0055aa;
}

.footer{
margin-top:20px;
font-size:12px;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<img src="logo.jpg" class="logo" alt="College Logo">

<h2>KLN College of Engineering</h2>

<p>Student Login Portal</p>

<form>

<input
type="text"
placeholder="Register Number"
required>

<input
type="date"
required>

<button type="submit">
Login
</button>

</form>

<div class="footer">

© 2026 KLN College of Engineering

</div>

</div>

</body>

</html>
